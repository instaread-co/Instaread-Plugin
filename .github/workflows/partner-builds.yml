name: Partner Plugin Builder

on:
  workflow_dispatch:
    inputs:
      partner_id:
        description: "Partner ID to build"
        required: true
        type: string
      version:
        description: "Plugin version"
        required: true
        default: "1.0.0"
        type: string

jobs:
  build-partner-plugin:
    runs-on: ubuntu-latest
    # Explicit token permissions — required because instaread-co org defaults
    # GITHUB_TOKEN to read-only. The workflow needs contents: write to push
    # the regenerated plugin.json commit and to create GitHub releases.
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git push later

      - name: Validate partner exists
        run: |
          if [ ! -d "partners/${{ github.event.inputs.partner_id }}" ]; then
            echo "::error::Partner directory not found: ${{ github.event.inputs.partner_id }}"
            exit 1
          fi

      - name: Generate partner plugin.json
        run: |
          PARTNER_ID="${{ github.event.inputs.partner_id }}"
          VERSION="${{ github.event.inputs.version }}"
          REPO_URL="https://github.com/${{ github.repository }}"

          cat > partners/${PARTNER_ID}/plugin.json << EOF
          {
            "name": "Instaread Audio Player - ${PARTNER_ID}",
            "version": "${VERSION}",
            "download_url": "${REPO_URL}/releases/download/${PARTNER_ID}-v${VERSION}/${PARTNER_ID}-v${VERSION}.zip",
            "requires": "5.6",
            "tested": "6.5",
            "sections": {
              "changelog": "<h4>${VERSION}</h4><ul><li>Partner-specific build for ${PARTNER_ID}</li></ul>"
            }
          }
          EOF

      - name: Sync partner config.json version
        # The running plugin sources its self-reported version from
        # partner_config['version'] (see core/instaread-core.php). If config.json's
        # version lags behind plugin.json's version, the installed plugin keeps
        # reporting the OLD version and WordPress shows "Update available" on
        # every cron cycle, even after the install succeeded.
        #
        # Uses a targeted regex edit (not full JSON re-serialization) so we
        # preserve the file's existing indentation, key ordering, and trailing
        # whitespace. The "version" field is always a top-level string field
        # in our partner configs, so this regex is safe.
        env:
          PARTNER_ID: ${{ github.event.inputs.partner_id }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          CONFIG="partners/${PARTNER_ID}/config.json"
          if [ -f "$CONFIG" ]; then
            python3 <<'PY'
          import json, os, re
          path = f"partners/{os.environ['PARTNER_ID']}/config.json"
          version = os.environ['VERSION']
          text = open(path).read()

          # Validate it's valid JSON before AND after the edit
          orig = json.loads(text)

          # Targeted replacement: "version": "<anything>" -> "version": "<new>"
          # Only the FIRST match (top-level field) to avoid hitting any nested
          # version-like field a partner config might have in the future.
          new_text, count = re.subn(
              r'"version"\s*:\s*"[^"]*"',
              f'"version": "{version}"',
              text,
              count=1,
          )

          if count == 0:
              # No version field present; insert one as the last key (rare).
              new_text = json.dumps({**orig, 'version': version}, indent=2) + '\n'

          # Sanity check: still valid JSON and version is what we set
          parsed = json.loads(new_text)
          assert parsed.get('version') == version, f"version field not updated: {parsed.get('version')!r}"

          with open(path, 'w') as f:
              f.write(new_text)
          print(f"config.json version set to {version} (regex replacements: {count})")
          PY
          else
            echo "::warning::No config.json for $PARTNER_ID, skipping sync"
          fi

      - name: Build partner plugin
        run: |
          PARTNER_ID="${{ github.event.inputs.partner_id }}"
          VERSION="${{ github.event.inputs.version }}"
          BUILD_DIR="build/${PARTNER_ID}"

          # Create build directory
          mkdir -p ${BUILD_DIR}

          # Copy core plugin files
          cp -r core/* ${BUILD_DIR}/

          # Copy plugin-update-checker from root (CRITICAL FIX)
          cp -r plugin-update-checker ${BUILD_DIR}/

          # Create mu-plugins directory and copy auto-updater (enables automatic updates on any WordPress)
          mkdir -p ${BUILD_DIR}/mu-plugins
          cp core/instaread-mu-plugin.php ${BUILD_DIR}/mu-plugins/instaread-auto-updater.php

          # Copy partner-specific config
          cp partners/${PARTNER_ID}/config.json ${BUILD_DIR}/
          cp partners/${PARTNER_ID}/styles.css ${BUILD_DIR}/ 2>/dev/null || true

          # Copy partner-specific JS
          cp partners/${PARTNER_ID}/partner.js ${BUILD_DIR}/ 2>/dev/null || true

          # Copy partner-specific composer.json
          cp partners/${PARTNER_ID}/composer.json ${BUILD_DIR}/ 2>/dev/null || true

          # Copy plugin.json into build directory
          cp partners/${PARTNER_ID}/plugin.json ${BUILD_DIR}/

          # Update plugin header with partner info
          sed -i "s/Plugin Name: Instaread Audio Player/Plugin Name: Instaread Audio Player - ${PARTNER_ID}/" ${BUILD_DIR}/instaread-core.php
          sed -i "s/Version: [0-9.]*/Version: ${VERSION}/" ${BUILD_DIR}/instaread-core.php
          sed -i "s/const PLUGIN_VERSION = '[0-9.]*'/const PLUGIN_VERSION = '${VERSION}'/" ${BUILD_DIR}/instaread-core.php

          # List contents for debugging
          echo "Build directory contents:"
          ls -la ${BUILD_DIR}/

          # Create ZIP
          cd build && zip -r ${PARTNER_ID}-v${VERSION}.zip ${PARTNER_ID}/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.partner_id }}-v${{ github.event.inputs.version }}
          name: "${{ github.event.inputs.partner_id }} Plugin v${{ github.event.inputs.version }}"
          files: build/${{ github.event.inputs.partner_id }}-v${{ github.event.inputs.version }}.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit plugin.json + config.json updates
        run: |
          PARTNER_ID="${{ github.event.inputs.partner_id }}"
          VERSION="${{ github.event.inputs.version }}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add partners/${PARTNER_ID}/plugin.json partners/${PARTNER_ID}/config.json

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to plugin.json/config.json, skipping commit"
          else
            git commit -m "Update plugin.json + config.json for ${PARTNER_ID} v${VERSION}"
            git push
          fi

      - name: Trigger instant update webhook
        if: success()
        run: |
          PARTNER_ID="${{ github.event.inputs.partner_id }}"
          VERSION="${{ github.event.inputs.version }}"
          WEBHOOK_URL="${{ secrets.INSTAREAD_WEBHOOK_URL }}"
          WEBHOOK_SECRET="${{ secrets.INSTAREAD_WEBHOOK_SECRET }}"

          # Build compact JSON payload (no whitespace so signature matches server re-serialization)
          PAYLOAD="{\"action\":\"published\",\"release\":{\"tag_name\":\"${PARTNER_ID}-v${VERSION}\",\"partner_id\":\"${PARTNER_ID}\",\"version\":\"${VERSION}\"}}"

          # Generate signature
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/.*= //')

          # Send webhook
          echo "Triggering webhook for $PARTNER_ID v$VERSION"
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Instaread-Signature: sha256=$SIGNATURE" \
            -d "$PAYLOAD" \
            -w "\nHTTP Status: %{http_code}\n"

          echo "✅ Webhook triggered successfully"

      - name: Log webhook trigger
        if: success()
        run: echo "✅ Update webhook triggered for ${{ github.event.inputs.partner_id }} v${{ github.event.inputs.version }}"
